<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyMedStock</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #F5F7FA;
    color: #0D2B4E;
    margin: 0;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .container {
    text-align: center;
    padding: 2rem;
    max-width: 480px;
  }
  .wordmark {
    font-size: 32px;
    font-weight: 500;
    margin-bottom: 8px;
  }
  .wordmark .my, .wordmark .stock { color: #0D2B4E; }
  .wordmark .med { color: #E8622A; }
  .tagline {
    color: #5A6F86;
    font-size: 14px;
    margin-bottom: 2.5rem;
  }
  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  a.link-button {
    display: block;
    padding: 14px 24px;
    border: 1.5px solid #0D2B4E;
    border-radius: 24px;
    color: #0D2B4E;
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    transition: background 0.2s;
  }
  a.link-button:hover {
    background: rgba(13,43,78,0.06);
  }
  .footer {
    margin-top: 3rem;
    font-size: 12px;
    color: #7FA8C9;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="wordmark">
      <span class="my">My</span><span class="med">Med</span><span class="stock">Stock</span>
    </div>
    <p class="tagline">Never run out of your medication again.</p>

    <div class="links">
      <a class="link-button" href="privacy-policy.html">Privacy Policy</a>
      <a class="link-button" href="terms.html">Terms &amp; Conditions</a>
    </div>

    <p class="footer">© 2026 MBJ Studio · support@mymedstock.app</p>
  </div>
</body>
</html>
